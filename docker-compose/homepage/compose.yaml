# Homepage — self-hosted dashboard.
# https://github.com/gethomepage/homepage

name: homepage

services:
  homepage:
    image: ghcr.io/gethomepage/homepage:v1.13.1@sha256:d8d784e5090111b6e4c56dfd90e272d2953a2094e87349f647165df0fa6c4401

    restart: unless-stopped
    init: true

    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    networks:
      - homepage

    ports:
      - "${HOMEPAGE_HOST_PORT:-17409}:3000"

    environment:
      TZ: ${TZ:-Europe/Warsaw}
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_ALLOWED_HOSTS:-*}

    volumes:
      - homepage:/app/config
      # Docker socket (read-only) for container status widgets.
      # For tighter security, replace with a docker-socket-proxy service.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Optional: local images directory for custom dashboard backgrounds.
      - ${HOMEPAGE_IMAGES_PATH:-/dev/null}:/app/public/images:ro

    healthcheck:
      test:
        - CMD-SHELL
        - "wget --quiet --tries=1 --spider http://127.0.0.1:3000/ || exit 1"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 64M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      - "diun.enable=true"

volumes:
  homepage:
    name: homepage
    external: true

networks:
  homepage:
    name: homepage
    external: true
