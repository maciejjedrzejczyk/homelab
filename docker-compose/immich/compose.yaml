# Immich — self-hosted photo & video library with ML.
# https://docs.immich.app/install/docker-compose
#
# Based on the official template from:
#   https://github.com/immich-app/immich/releases/latest/download/docker-compose.yml
# with added hardening, resource limits, and digest pinning.

name: immich

services:
  server:
    image: ghcr.io/immich-app/immich-server:v2.7.5@sha256:c15bff75068effb03f4355997d03dc7e0fc58720c2b54ad6f7f10d1bc57efaa5
    # extends:
    #   file: hwaccel.transcoding.yml
    #   service: cpu # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding

    restart: unless-stopped

    security_opt:
      - no-new-privileges:true

    networks:
      - immich

    ports:
      - "${IMMICH_HOST_PORT:-17426}:2283"

    volumes:
      - immich-data:/data
      - /etc/localtime:/etc/localtime:ro
      # Alternative: bind mount to host path for direct filesystem access.
      # Requires the host directory to be readable by the container.
      # - ${UPLOAD_LOCATION}:/data

    env_file:
      - .env

    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy

    healthcheck:
      disable: false

    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 2G
        reservations:
          memory: 256M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      - "diun.enable=true"

  machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v2.7.5@sha256:a2501141440f10516d329fdfba2c68082e19eb9ba6016c061ac80d23beadf7f3
    # extends:
    #   file: hwaccel.ml.yml
    #   service: cpu # set to one of [armnn, cuda, rocm, openvino, openvino-wsl, rknn] for accelerated inference

    restart: unless-stopped

    security_opt:
      - no-new-privileges:true

    networks:
      - immich

    volumes:
      - immich-model-cache:/cache

    env_file:
      - .env

    healthcheck:
      disable: false

    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          memory: 512M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      - "diun.enable=true"

  redis:
    image: docker.io/valkey/valkey:9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9

    restart: unless-stopped
    init: true

    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true

    networks:
      - immich

    healthcheck:
      test:
        - CMD
        - valkey-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23

    restart: unless-stopped

    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_READ_SEARCH
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true

    networks:
      - immich

    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_DB: ${DB_DATABASE_NAME:-immich}
      POSTGRES_INITDB_ARGS: "--data-checksums"

    volumes:
      - immich-db:/var/lib/postgresql/data
      # Alternative: bind mount to host path for direct filesystem access.
      # - ${DB_DATA_LOCATION}:/var/lib/postgresql/data

    shm_size: 128mb

    healthcheck:
      disable: false

    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 256M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  immich-model-cache:
    name: immich-model-cache
  immich-data:
    name: immich-data
    external: true
  immich-db:
    name: immich-db
    external: true

networks:
  immich:
    name: immich
