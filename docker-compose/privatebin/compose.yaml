# PrivateBin — self-hosted encrypted pastebin.
# https://github.com/PrivateBin/PrivateBin

name: privatebin

services:
  privatebin:
    image: privatebin/nginx-fpm-alpine:2.0.4@sha256:2ac9dfbdb2a1365a1e7ef4de1fc67f524cd2fef96c7477c727c335381c634c7c

    restart: unless-stopped

    # PrivateBin's s6-overlay requires broad capabilities to spawn services.
    # cap_drop with selective add doesn't work here.

    networks:
      - privatebin

    ports:
      - "${PRIVATEBIN_HOST_PORT:-17420}:8080"

    environment:
      TZ: ${TZ:-Europe/Warsaw}

    volumes:
      - privatebin:/srv/data

    healthcheck:
      test:
        - CMD-SHELL
        - "pgrep -f 'php-fpm.*master' || exit 1"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 32M

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

    labels:
      - "diun.enable=true"

volumes:
  privatebin:
    name: privatebin
    external: true

networks:
  privatebin:
    name: privatebin
    external: true
