# Pi-hole + Unbound — ad-blocking DNS with local recursive resolution.
# https://docs.pi-hole.net/guides/dns/unbound/

name: pihole-unbound

services:
  pihole:
    image: pihole/pihole:2026.05.0@sha256:70a9c11171ded2eee735d88c127996da209284a329d50f5ae59c06b861d401b3

    restart: unless-stopped

    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - NET_RAW
      - SETFCAP

    networks:
      - pihole-unbound

    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "${PIHOLE_WEBPORT:-17418}:80/tcp"

    environment:
      TZ: ${TZ:-Europe/Warsaw}
      FTLCONF_webserver_api_password: ${PIHOLE_PASSWORD}
      FTLCONF_dns_upstreams: "unbound#5335"
      FTLCONF_dns_dnssec: "true"
      FTLCONF_dns_listeningMode: "all"

    volumes:
      - pihole-config:/etc/pihole
      - pihole-dnsmasq:/etc/dnsmasq.d

    depends_on:
      - unbound

    healthcheck:
      test:
        - CMD-SHELL
        - "dig +short +norecurse +retry=0 @127.0.0.1 pi.hole || exit 1"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          memory: 64M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      - "diun.enable=true"

  unbound:
    image: klutchell/unbound:1.23.0@sha256:17ea6e14cfed57506c9db69686eb4de665056a342922727f3a6bbea50be184e4

    restart: unless-stopped
    init: true

    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - KILL
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true

    networks:
      - pihole-unbound

    volumes:
      - unbound-config:/etc/unbound/custom.conf.d:ro

    # Note: no healthcheck — this is a distroless image with no shell or
    # utility binaries. Unbound's health is verified indirectly: if Pi-hole
    # can resolve via unbound#5335, the service is working.

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 32M

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

    labels:
      - "diun.enable=true"

volumes:
  pihole-config:
    name: pihole-config
  pihole-dnsmasq:
    name: pihole-dnsmasq
  unbound-config:
    name: unbound-config
    external: true

networks:
  pihole-unbound:
    name: pihole-unbound
