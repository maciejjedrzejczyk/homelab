# Vaultwarden — self-hosted Bitwarden-compatible vault.
# https://github.com/dani-garcia/vaultwarden
#
# This file is the reference stack for the repo. New stacks should mirror its
# structure: pinned image, hardened defaults, healthcheck, resource limits,
# logging caps, and secrets routed through Compose `secrets:` + `*_FILE`.

name: vaultwarden

services:
  vaultwarden:
    image: vaultwarden/server:1.35.7@sha256:9a8eec71f4a52411cc43edc7a50f33e9b6f62b5baca0dd95f0c6e7fd60f1a341
    # The digest above is the OCI image index (multi-arch manifest list), so it
    # resolves correctly on amd64, arm64, arm/v6, and arm/v7 hosts. To refresh
    # after upgrading the tag:
    #   docker buildx imagetools inspect vaultwarden/server:<new-tag>
    # and copy the top-level `Digest:` value.

    restart: unless-stopped
    init: true

    # Hardening
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    networks:
      - vaultwarden

    ports:
      # Host port is configurable; container always listens on 80.
      - "${VAULTWARDEN_HOST_PORT:-17421}:80"

    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      DOMAIN: ${DOMAIN}
      SIGNUPS_ALLOWED: ${SIGNUPS_ALLOWED:-false}
      INVITATIONS_ALLOWED: ${INVITATIONS_ALLOWED:-false}
      SHOW_PASSWORD_HINT: ${SHOW_PASSWORD_HINT:-false}
      PASSWORD_HINTS_ALLOWED: ${PASSWORD_HINTS_ALLOWED:-false}
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      IP_HEADER: ${IP_HEADER:-X-Real-IP}
      TZ: ${TZ:-Europe/Warsaw}

    volumes:
      - vaultwarden:/data

    healthcheck:
      test:
        - CMD-SHELL
        - "curl -fsS http://127.0.0.1:80/alive || exit 1"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 64M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      - "diun.enable=true"

volumes:
  vaultwarden:
    name: vaultwarden
    external: true

networks:
  vaultwarden:
    name: vaultwarden
    external: true
