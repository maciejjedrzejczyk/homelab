# Nginx Proxy Manager — reverse proxy with Let's Encrypt and web UI.
# https://github.com/NginxProxyManager/nginx-proxy-manager

name: nginx-proxy-manager

services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:2.14.0@sha256:2aa69b382a384b676c0d4f1d6f2eac40ecd478fcf7af1cfb3f9f1d3cd0c81e12

    restart: unless-stopped

    # Note: no `init: true` here — NPM uses s6-overlay as its own init
    # system and requires being PID 1.

    # Hardening — NPM needs NET_BIND_SERVICE for ports 80/443 and various
    # filesystem writes (SQLite DB, Let's Encrypt certs, generated configs),
    # so read_only is not feasible here.
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true

    networks:
      - nginx-proxy-manager

    ports:
      - "${NPM_HTTP_PORT:-80}:80"
      - "${NPM_HTTPS_PORT:-443}:443"
      - "${NPM_ADMIN_PORT:-17413}:81"

    environment:
      TZ: ${TZ:-Europe/Warsaw}
      # Uncomment if IPv6 is not enabled on the host:
      # DISABLE_IPV6: "true"

    volumes:
      - nginx-proxy-manager-data:/data
      - nginx-proxy-manager-letsencrypt:/etc/letsencrypt

    healthcheck:
      test:
        - CMD-SHELL
        - "curl -fsS http://127.0.0.1:81/api/ || exit 1"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
        reservations:
          memory: 128M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      - "diun.enable=true"

volumes:
  nginx-proxy-manager-data:
    name: nginx-proxy-manager-data
    external: true
  nginx-proxy-manager-letsencrypt:
    name: nginx-proxy-manager-letsencrypt
    external: true

networks:
  nginx-proxy-manager:
    name: nginx-proxy-manager
    external: true
